body{font-family:'Inter',system-ui,sans-serif;background:var(--page);color:var(--text);transition:background .2s,color .2s;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);line-height:1.5}
textarea,input,button,select{font-family:'Inter',system-ui,sans-serif}
.hd{font-family:'Lora',Georgia,serif}
.mn{font-family:'JetBrains Mono',monospace}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg)}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:.78rem;white-space:nowrap;transition:background .15s}
.btn:hover:not(:disabled){background:var(--border)}
.btn:disabled{opacity:.4;cursor:default}
.btn-a{background:var(--accent);color:var(--on-accent);border:none;padding:9px 20px;border-radius:var(--radius-md);cursor:pointer;font-size:.82rem;font-weight:600;transition:opacity .15s}
.btn-a:hover{opacity:.85}
.inp{background:var(--input-bg);border:1px solid var(--input-border);border-radius:var(--radius-sm);color:var(--text);padding:7px 10px;font-size:.81rem;width:100%;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--input-focus)}
.ta{background:var(--input-bg);border:1px solid var(--input-border);border-radius:var(--radius-sm);color:var(--text);padding:7px 10px;font-size:.81rem;width:100%;max-width:100%;outline:none;resize:vertical;overflow:hidden;box-sizing:border-box;transition:border-color .15s}
.ta:focus{border-color:var(--input-focus)}
.fl{font-size:.7rem;color:var(--text-secondary);display:flex;align-items:center;margin-bottom:5px}
.flb{font-size:.7rem;color:var(--text-secondary);display:block;margin-bottom:5px}
.brk{padding:4px 14px;font-size:.68rem;color:var(--break-text);border-bottom:1px solid var(--border);background:var(--break-bg);display:flex;justify-content:space-between;font-style:italic}
.pr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .12s}
.pr.exp{background:var(--row-open)}
.prd{padding:12px 16px 16px;background:var(--surface-open);border-top:1px solid var(--border)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200}
.pill{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:.76rem;background:var(--surface);color:var(--text-secondary);border:1px solid var(--border);transition:background .15s}
.pill:hover{background:var(--border)}
.vtab{padding:5px 12px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:.74rem;font-weight:500;background:transparent;color:var(--text-secondary);font-family:'Inter',system-ui,sans-serif;transition:background .15s,color .15s}
.vtab:hover{background:var(--surface)}
.vtab.on{font-weight:600;background:var(--accent);color:var(--on-accent)}
.sl{font-size:.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.12em;font-weight:600;font-family:'Inter',system-ui,sans-serif}
.pb{border-radius:var(--radius-sm);padding:4px 7px;margin-bottom:3px;cursor:pointer;display:flex;flex-direction:column;gap:1px;min-height:40px;font-size:.62rem;font-weight:600;overflow:hidden;justify-content:flex-start;min-width:0;transition:outline-color .15s}
.pb:hover{outline:1.5px solid var(--accent)}
.pb-nc{background:var(--nc-bg);color:var(--nc-text);border:1px dashed var(--bar-empty)}
.pb-e{border:1px solid var(--error)}
.qe{background:var(--card);border:1.5px solid var(--accent);border-radius:var(--radius-lg);padding:14px 16px;margin-top:12px;display:flex;flex-direction:column;gap:10px}
.cv{display:flex;gap:12px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.cv:hover{background:var(--row-open)}
.cv.empty{opacity:.5}
.xps{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:6px 12px;display:flex;align-items:center;gap:10px;font-size:.66rem;margin-bottom:8px}
.xpbo{flex:1;height:6px;background:var(--xp-bar-bg);border-radius:3px;overflow:hidden;min-width:50px}
.xpbf{height:100%;background:var(--xp-bar);border-radius:3px;transition:width .6s;box-shadow:0 0 8px var(--xp-glow)}
.bs{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.bm{width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);font-size:.8rem;border:1px solid var(--border);cursor:default;position:relative}
.bm.lk{opacity:.2;filter:grayscale(1)}
.bm .bt{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:6px 10px;font-size:.62rem;white-space:nowrap;z-index:10;color:var(--text-secondary);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.bm:hover .bt{display:block}
.fwb{font-size:.64rem;color:var(--text-muted);display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.fw{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-family:'JetBrains Mono',monospace;font-size:.6rem}
.wk-grid{display:grid;gap:3px 6px;align-items:stretch}
.wk-grid>div{min-width:0;overflow:hidden}
.date-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.date-row .inp{max-width:160px}
.tt-grid{display:grid;gap:4px;font-size:.72rem}
.tt-grid select,.tt-grid input{padding:5px 7px;font-size:.72rem;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
.cal-cell{display:flex;align-items:center;justify-content:center;height:34px;border-radius:var(--radius-sm);font-size:.73rem;cursor:pointer;transition:background .12s,color .12s;border:1px solid transparent;position:relative}
.cal-cell:hover:not(.cal-dis):not(.cal-lk){background:var(--cal-hover)}
.cal-cell.cal-sel{background:var(--cal-sel);color:var(--cal-sel-text);font-weight:600}
.cal-cell.cal-we{color:var(--text-muted);background:var(--cal-we)}
.cal-cell.cal-dis{opacity:.25;cursor:default}
.cal-cell.cal-lk{background:var(--dz-bg);color:var(--dz-text);cursor:default;border:1px dashed var(--dz-border)}
.cal-hdr{font-size:.64rem;color:var(--text-muted);text-align:center;font-weight:600;padding:5px 0}
.csw{width:24px;height:24px;border-radius:var(--radius-sm);cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s;flex-shrink:0}
.csw:hover{transform:scale(1.15)}
.csw.on{border-color:var(--text);transform:scale(1.2)}
.tt-combo{position:relative}
.tt-combo input{width:100%;padding:5px 20px 5px 7px;font-size:.72rem;text-align:center}
.tt-combo .tt-dd{position:absolute;top:100%;left:0;right:0;z-index:30;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:0 6px 20px rgba(0,0,0,.12);max-height:200px;overflow-y:auto}
.tt-combo .tt-opt{padding:5px 10px;cursor:pointer;font-size:.72rem;display:flex;align-items:center;gap:8px;transition:background .1s}
.tt-combo .tt-opt:hover{background:var(--row-open)}
@keyframes fl1{0%,100%{opacity:.9}50%{opacity:.45}}
@keyframes fl2{0%,100%{opacity:.85}50%{opacity:.35}}
@keyframes od{from{stroke-dashoffset:0}to{stroke-dashoffset:-12}}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:.8}}
.ach{transition:transform .15s,box-shadow .15s}
.ach.un:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
@media print{.np{display:none!important}body{background:#fff!important;color:#000!important}.card{border:1px solid #ccc!important;background:#fff!important;break-inside:avoid}}
</style>

function migrateConfig(cfg){
  if(!cfg)return cfg;
  if(cfg.holidays&&cfg.holidays.length>0&&typeof cfg.holidays[0]==="string")cfg.holidays=cfg.holidays.map(d=>({date:d,name:"Public Holiday"}));
  if(cfg.dayZeros&&cfg.dayZeros.length>0&&typeof cfg.dayZeros[0]==="string")cfg.dayZeros=cfg.dayZeros.map(d=>({date:d,label:"Day 0",source:"manual"}));
  if(cfg.dayZeros)cfg.dayZeros=cfg.dayZeros.map(d=>({...d,source:d.source||"manual"}));
  if(cfg.classes)cfg.classes=cfg.classes.map(c=>({...c,description:c.description||""}));
  if(!cfg.theme)cfg.theme="physics";
  sSet("planner-config",cfg);return cfg;
}
function syncHolsToDZ(holidays,dayZeros){
  const holDates=new Set((holidays||[]).map(h=>h.date));
  let dz=(dayZeros||[]).filter(d=>d.source!=="statutory"||holDates.has(d.date));
  const dzDates=new Set(dz.map(d=>d.date));
  (holidays||[]).forEach(h=>{if(!dzDates.has(h.date))dz.push({date:h.date,label:h.name||"Public Holiday",source:"statutory"})});
  dz=dz.map(d=>{if(d.source==="statutory"){const h=(holidays||[]).find(hh=>hh.date===d.date);if(h)return{...d,label:h.name||"Public Holiday"}}return d});
  return dz;
}

/* ═══ DATE ENGINE ════════════════════════════════════════════════════════ */
const dk=d=>`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
const dck=d=>`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
const fmtF=d=>d.toLocaleDateString("en-NZ",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
const fmtS=d=>d.toLocaleDateString("en-NZ",{weekday:"short",day:"numeric",month:"short"});
const fmtISO=d=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return`${y}-${m}-${dd}`};
const parseISO=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)};
const isWE=d=>{const w=d.getDay();return w===0||w===6};
const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r};
function getMon(d){const r=new Date(d),w=r.getDay();r.setDate(r.getDate()-(w===0?6:w-1));r.setHours(0,0,0,0);return r}
function getPlanMon(d){const w=d.getDay();if(w===0||w===6){const r=new Date(d);r.setDate(r.getDate()+(w===0?1:2));r.setHours(0,0,0,0);return r}return getMon(d)}
const getWDs=b=>{const m=getMon(b);return[0,1,2,3,4].map(i=>addD(m,i))};

function makeDateEngine(cfg){
  if(!cfg)return null;
  const holDates=(cfg.holidays||[]).map(h=>typeof h==="string"?h:h.date);
  const dzDates=(cfg.dayZeros||[]).map(d=>typeof d==="string"?d:d.date);
  const holSet=new Set(holDates.map(s=>dck(parseISO(s))));
  const dzSet=new Set(dzDates.map(s=>dck(parseISO(s))));
  const terms=(cfg.terms||[]).filter(t=>t.start&&t.end).map(t=>({n:t.n,start:parseISO(t.start),end:parseISO(t.end)}));
  const anchor=(cfg.anchor&&cfg.anchor.date)?{date:parseISO(cfg.anchor.date),day:cfg.anchor.day}:null;
  const timetable=cfg.timetable||{};
  const classes=(cfg.classes||[]);
  const classMap={};classes.forEach(c=>{classMap[c.code]={bg:c.colour,tx:TEXT_FOR_BG[c.colour]||"#000",desc:c.description||""}});
  const classCodes=classes.map(c=>c.code);
  const nCycle=cfg.cycleDays||7;
  const PIDS=[];for(let i=1;i<=6;i++)PIDS.push("p"+i);
  const isPH=d=>holSet.has(dck(d));const isDZ=d=>dzSet.has(dck(d));
  const inT=d=>terms.some(t=>d>=t.start&&d<=t.end);
  const isSD=d=>!isWE(d)&&!isPH(d)&&inT(d);const isTD=d=>isSD(d)&&!isDZ(d);
  const wkN=b=>8+Math.round((getMon(b)-(anchor?getMon(anchor.date):getMon(new Date())))/(7*864e5));

  function termWkN(weekdays){
    for(const term of terms){
      const ts=new Date(term.start);ts.setHours(0,0,0,0);const te=new Date(term.end);te.setHours(23,59,59,999);
      if(weekdays.some(d=>{const dd=new Date(d);dd.setHours(0,0,0,0);return dd>=ts&&dd<=te})){
        const curMon=getMon(weekdays[0]);curMon.setHours(12,0,0,0);const termMon=getMon(ts);termMon.setHours(12,0,0,0);
        return{tn:term.n,wk:Math.floor(Math.round((curMon-termMon)/864e5)/7)+1};
      }
    }return null;
  }
  function nearSD(d,dir){let x=addD(d,dir);for(let i=0;i<60;i++){if(isSD(x))return x;x=addD(x,dir)}return null}
  function cycD(date){
    const t=new Date(date);t.setHours(0,0,0,0);
    if(!isSD(t))return null;if(isDZ(t))return 0;if(!anchor)return 1;
    const a=new Date(anchor.date);a.setHours(0,0,0,0);let n=0,d=new Date(a);
    if(t>=a){while(d<t){if(isTD(d))n++;d.setDate(d.getDate()+1)}return((anchor.day-1+n)%nCycle)+1}
    else{while(d>t){d.setDate(d.getDate()-1);if(isTD(d))n++}return(((anchor.day-1-n)%nCycle)+nCycle)%nCycle+1}
  }
  function getTermWks(term){
    const ts=new Date(term.start);ts.setHours(0,0,0,0);const te=new Date(term.end);te.setHours(23,59,59,999);
    const ws=[];let d=getMon(ts);while(d<=te){const days=[0,1,2,3,4].map(i=>addD(d,i));if(days.some(x=>{const xn=new Date(x);xn.setHours(0,0,0,0);return xn>=ts&&xn<=te}))ws.push(days);d=addD(d,7)}return ws;
  }
  function clsLessons(cc,ti=0){const term=terms[ti];if(!term)return[];const ls=[];getTermWks(term).flat().forEach(d=>{const cd=cycD(d);if(!cd||cd===0)return;PIDS.forEach(pid=>{if(timetable[cd]&&timetable[cd][pid]===cc)ls.push({date:new Date(d),dk:dk(d),pid,cd})})});return ls}
  function lesCtx(cc,dateKey,pid,ti=0){if(!cc||cc==="nc")return null;const ls=clsLessons(cc,ti);const idx=ls.findIndex(l=>l.dk===dateKey&&l.pid===pid);if(idx===-1)return null;return{num:idx+1,total:ls.length,prev:ls[idx-1]||null,next:ls[idx+1]||null}}
  return{isPH,isDZ,inT,isSD,isTD,wkN,termWkN,nearSD,cycD,getTermWks,clsLessons,lesCtx,terms,timetable,classMap,classCodes,PIDS,nCycle,school:cfg.school||"My School"};
}

/* ═══ UNIVERSAL GAMIFICATION ENGINE ══════════════════════════════════════ */
function compGam(eng,pwn,themeKey){
  const th=getTheme(themeKey);
  const empty={cum:{tp:0,tl:0,sk:0,ls:0},term:{tp:0,tl:0,pw:0,allCls:false,allHalf:false,cd:{}},sk:0,ls:0,achs:[],xp:0,lev:th.levels[0],nxt:th.levels[1],levXp:0,nxtXp:100,cw:{p:0,t:0},th,pw:0,tp:0,tl:0,wd:{},cd:{}};
  if(!eng)return empty;
  const now=new Date();now.setHours(0,0,0,0);
  let ati=0;for(let i=0;i<eng.terms.length;i++){if(now<=eng.terms[i].end){ati=i;break}else ati=i}

  function calcStats(termList){
    const wd={},cd={};let tp=0,tl=0;
    termList.forEach(term=>{eng.getTermWks(term).flat().forEach(d=>{
      const c=eng.cycD(d);if(!c||c===0)return;const key=dk(d),wn=eng.wkN(d);
      if(!wd[wn])wd[wn]={p:0,t:0};
      eng.PIDS.forEach(pid=>{const cls=eng.timetable[c]&&eng.timetable[c][pid];if(!cls||cls==="nc")return;
        tl++;wd[wn].t++;if(!cd[cls])cd[cls]={p:0,t:0};cd[cls].t++;
        const n=sGet(`note:${key}:${pid}`);if(n&&(n.subject||n.notes||n.status==="nl")){tp++;wd[wn].p++;cd[cls].p++}});
    })});
    const pw=Object.values(wd).filter(w=>w.t>0&&w.p===w.t).length;
    const allCls=eng.classCodes.length>0&&eng.classCodes.every(c=>cd[c]&&cd[c].p>0);
    const allHalf=eng.classCodes.length>0&&eng.classCodes.every(c=>{const d=cd[c];return d&&d.p>d.t*.5});
    return{tp,tl,pw,wd,cd,allCls,allHalf};
  }

  const cum=calcStats(eng.terms);
  const at=eng.terms[ati];const term=at?calcStats([at]):{tp:0,tl:0,pw:0,wd:{},cd:{},allCls:false,allHalf:false};

  const sorted=Object.keys(cum.wd).map(Number).filter(n=>n<=pwn).sort((a,b)=>b-a);
  let sk=0;for(const wn of sorted){const w=cum.wd[wn];if(w&&w.t>0&&w.p/w.t>=.8)sk++;else break}
  let longest=0,run=0;Object.keys(cum.wd).map(Number).sort((a,b)=>a-b).forEach(wn=>{const w=cum.wd[wn];if(w&&w.t>0&&w.p/w.t>=.8){run++;if(run>longest)longest=run}else run=0});

  const st={cum:{...cum,sk,ls:longest},term};
  const achs=ACH_TRIGGERS.map((a,i)=>({...a,...th.achs[i],unlocked:a.ck(st)}));
  let xp=cum.tp*10+cum.pw*50;achs.forEach(a=>{if(a.unlocked)xp+=a.xp});
  let levIdx=0;LEVEL_XP.forEach((x,i)=>{if(xp>=x)levIdx=i});
  const cw=cum.wd[pwn]||{p:0,t:0};
  return{cum,term,sk,ls:longest,achs,xp,lev:th.levels[levIdx],nxt:th.levels[levIdx+1]||null,levXp:LEVEL_XP[levIdx],nxtXp:LEVEL_XP[levIdx+1],cw,th,pw:cum.pw,tp:cum.tp,tl:cum.tl,wd:cum.wd,cd:cum.cd};
}

function useAutoSave(sk,dv,onSave){
  const dr=useRef(dv);const[data,setData]=useState(()=>{if(!sk)return null;const s=sGet(sk);return{...dr.current,...(s||{})}});
  const ref=useRef(data||{...dv});const[ss,setSS]=useState("idle");const bt=useRef(null),st=useRef(null);
  useEffect(()=>{if(!sk){setData(null);return}const s=sGet(sk),m={...dr.current,...(s||{})};ref.current=m;setData(m);setSS("idle");return()=>{clearTimeout(bt.current);clearTimeout(st.current)}},[sk]);
  const save=useCallback(()=>{if(!sk)return;clearTimeout(st.current);setSS("saving");const ok=sSet(sk,ref.current);if(ok&&onSave)onSave({...ref.current});if(ok&&window._plannerSync)window._plannerSync();if(ok&&window._plannerGamRefresh)window._plannerGamRefresh();setSS(ok?"saved":"error");st.current=setTimeout(()=>setSS("idle"),2000)},[sk,onSave]);
  const updateField=useCallback((f,v)=>{const u={...ref.current,[f]:v};ref.current=u;setData({...u})},[]);
  const hFoc=useCallback(()=>clearTimeout(bt.current),[]);
  const hBlr=useCallback(()=>{clearTimeout(bt.current);bt.current=setTimeout(save,80)},[save]);
  return{data,updateField,ss,hFoc,hBlr,save};
}
function useToday(){
  const[today,setToday]=useState(()=>{const d=new Date();d.setHours(0,0,0,0);return d});
  useEffect(()=>{const now=new Date(),tom=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1),ms=tom-now+200;const t=setTimeout(()=>{const d=new Date();d.setHours(0,0,0,0);setToday(d)},ms);return()=>clearTimeout(t)},[today]);
  return today;
}

    <div style={{display:"grid",gridTemplateColumns:"58px repeat(5,1fr)",gap:3,marginBottom:4}}><div/>{["Mon","Tue","Wed","Thu","Fri"].map(d=><div key={d} className="hd" style={{fontSize:".66rem",color:"var(--text-muted)",textAlign:"center",fontWeight:600}}>{d}</div>)}</div>
    {weeks.map((days,wi)=><div key={wi} style={{display:"grid",gridTemplateColumns:"58px repeat(5,1fr)",gap:3,marginBottom:3,alignItems:"start"}}><div style={{paddingTop:2}}><Btn onClick={()=>onWk(days[0])} style={{padding:"3px 0",fontSize:".64rem",width:"100%",textAlign:"center",borderRadius:5}}>Wk {wi+1}</Btn></div>
      {days.map(d=>{const dn=new Date(d);dn.setHours(0,0,0,0);const iT=dn>=ts&&dn<=te,sch=eng.isSD(d),isT=dn.toDateString()===today.toDateString(),cd=sch?eng.cycD(d):null,isZ=cd===0,k=dk(d),meta=mc[k]||eM(),cv=cov[k];
        if(!iT||!sch)return<div key={k} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",minHeight:50,display:"flex",alignItems:"center",justifyContent:"center",padding:"2px 4px"}}>{iT&&(()=>{const hol=(cfg.holidays||[]).find(h=>(typeof h==="string"?h:h.date)===fmtISO(d));return<span style={{fontSize:".55rem",color:"var(--text-muted)",textAlign:"center",lineHeight:1.3}}>{hol&&typeof hol!=="string"?hol.name:"holiday"}</span>})()}</div>;
        return<div key={k} onClick={()=>onDay(d)} style={{background:isT?"var(--today-bg)":isZ?"var(--dz-bg)":"var(--card)",border:`1px solid ${isT?"var(--today-border)":isZ?"var(--dz-border)":"var(--border)"}`,borderRadius:"var(--radius-sm)",padding:"4px 5px",cursor:"pointer",minHeight:50}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:2}}><span className="hd" style={{fontSize:".76rem",fontWeight:700,color:isZ?"var(--dz-text)":isT?"var(--accent)":"var(--text)"}}>{d.getDate()}<span style={{fontSize:".55rem",fontWeight:400,color:"var(--text-muted)",marginLeft:2}}>{d.toLocaleDateString("en-NZ",{month:"short"})}</span></span><span className="mn" style={{fontSize:".55rem",fontWeight:600,color:isZ?"var(--dz-text)":"var(--accent)"}}>{isZ?"D0":`D${cd}`}</span></div>

}

/* ═══ EXPORT HELPERS ════════════════════════════════════════════════════ */
function buildWkTxt(style,days,wl,wkLabel,sum,mc,eng,wNotes){
  const h1=s=>style==="org"?`* ${s}\n`:style==="plain"?`${s}\n${"=".repeat(Math.min(s.length,44))}\n`:`# ${s}\n`;
  const h2=s=>style==="org"?`** ${s}\n`:style==="plain"?`${s}\n${"-".repeat(Math.min(s.length,44))}\n`:`## ${s}\n`;
  const h3=s=>style==="org"?`*** ${s}\n`:style==="plain"?`  ${s}:\n`:`### ${s}\n`;
  const bq=s=>style==="md"?`> ${s}\n`:`  ${s}\n`;
  const sep=style==="md"?"---\n\n":"";
  let out=h1(`Week Plan \u2014 ${wl}`);
  out+=style==="md"?`**${wkLabel}** \u00B7 ${sum.p}/${sum.t} planned\n\n`:`${wkLabel} \u00B7 ${sum.p}/${sum.t} planned\n\n`;
  days.forEach(d=>{
    const cd=eng.cycD(d),sch=eng.isSD(d),isZ=cd===0,key=dk(d),meta=mc[key]||eM();
    out+=sep+h2(fmtF(d));
    if(!sch){out+=(style==="md"?"*No school*":"No school")+"\n\n";return}
    if(isZ){out+=`Day 0${meta.day0label?": "+meta.day0label:""}\n\n`;if(meta.dayNotes)out+=meta.dayNotes+"\n\n";return}
    out+=`Day ${cd} | ${(MMT[meta.mmType]||MMT.tutor).label}\n\n`;
    if(meta.dayNotes)out+=bq(meta.dayNotes)+"\n";
    eng.PIDS.forEach((pid,pi)=>{
      const cls=(eng.timetable[cd]||{})[pid]||"nc";const n=wNotes[`${key}:${pid}`];
      const per=bldP(meta.mmType||"tutor").find(p=>p.id===pid);
      const lbl=`P${pi+1} (${per?per.start+"\u2013"+per.end:""})`;
      const nlTag=n&&n.status==="nl"?" \u2014 No lesson":"";
      if(cls==="nc"){
        const nc=style==="md"?`- **${lbl}** \u2014 Non-contact${n&&n.notes?": "+n.notes:""}`:style==="org"?`- ${lbl}: Non-contact${n&&n.notes?": "+n.notes:""}`:`  ${lbl}: Non-contact${n&&n.notes?": "+n.notes:""}`;
        out+=nc+"\n";
      } else {
        const subj=n&&n.subject?` \u2014 ${n.subject}`:nlTag;
        if(style==="md"){out+=`- **${lbl} ${cls}**${subj}\n`;if(n&&n.notes)out+=`  - Notes: ${n.notes}\n`;if(n&&n.resources)out+=`  - Resources: ${n.resources}\n`}
        else if(style==="org"){out+=`- ${lbl} ${cls}${subj}\n`;if(n&&n.notes)out+=`  Notes: ${n.notes}\n`;if(n&&n.resources)out+=`  Resources: ${n.resources}\n`}
        else{out+=`  ${lbl} ${cls}${subj}\n`;if(n&&n.notes)out+=`    Notes: ${n.notes}\n`;if(n&&n.resources)out+=`    Resources: ${n.resources}\n`}
      }
    });
    if(meta.reflections)out+="\n"+h3("Reflections")+"\n"+meta.reflections+"\n";
    out+="\n";
  });
  return out;
}
function buildReflTxt(style,days,wl,mc){
  const h1=s=>style==="org"?`* ${s}\n`:style==="plain"?`${s}\n${"=".repeat(Math.min(s.length,44))}\n`:`# ${s}\n`;
  const h2=s=>style==="org"?`** ${s}\n`:style==="plain"?`${s}\n${"-".repeat(Math.min(s.length,44))}\n`:`## ${s}\n`;
  let out=h1(`Reflections \u2014 ${wl}\n`)+"\n";
  days.forEach(d=>{const r=(mc[dk(d)]||eM()).reflections;if(r){out+=h2(fmtF(d))+"\n"+r+"\n\n"}});
  return out;
}
function doDownload(content,filename){const blob=new Blob([content],{type:"text/plain"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}

/* ═══ THEMED WEEKLY VISUAL ═══════════════════════════════════════════════ */
function WeeklyVisual({pct,theme}){
  const p=Math.min(100,Math.max(0,pct));const ms=theme.milestones;
  const bgGrad=theme===THEMES.ocean?'<stop offset="0%" stop-color="#87CEEB"/><stop offset="30%" stop-color="#1E90FF"/><stop offset="60%" stop-color="#0a3d6b"/><stop offset="85%" stop-color="#041428"/><stop offset="100%" stop-color="#010810"/>'
    :theme===THEMES.nzbirds?'<stop offset="0%" stop-color="#020208"/><stop offset="20%" stop-color="#1a3050"/><stop offset="50%" stop-color="#4a8a60"/><stop offset="80%" stop-color="#2a5a22"/><stop offset="100%" stop-color="#1a3a12"/>'
    :theme===THEMES.coffee?'<stop offset="0%" stop-color="#1a0e08"/><stop offset="30%" stop-color="#3a2010"/><stop offset="60%" stop-color="#5c3d20"/><stop offset="85%" stop-color="#8b6840"/><stop offset="100%" stop-color="#c4a070"/>'
    :theme===THEMES.cooking?'<stop offset="0%" stop-color="#1a0808"/><stop offset="30%" stop-color="#2a1a10"/><stop offset="60%" stop-color="#4a3020"/><stop offset="85%" stop-color="#6a4a30"/><stop offset="100%" stop-color="#c4a070"/>'
    :'<stop offset="0%" stop-color="#020208"/><stop offset="25%" stop-color="#060818"/><stop offset="55%" stop-color="#0c2040"/><stop offset="85%" stop-color="#1a4a7a"/><stop offset="100%" stop-color="#3a7ab8"/>';
  let svg=`<defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">${bgGrad}</linearGradient></defs><rect width="250" height="400" fill="url(#sg)" rx="10"/>`;
  if(theme===THEMES.physics||theme===THEMES.nzbirds){for(let i=0;i<20;i++){const x=12+(i*47+i*i*17)%226,y=6+(i*31+i*i*13)%140;svg+=`<circle cx="${x}" cy="${y}" r="${.5+(i%3)*.4}" fill="#fff" opacity=".15"/>`}}
  ms.forEach(m=>{svg+=`<g opacity="${p>=m.pc?1:.12}"><text x="15" y="${m.y+5}" font-size="14">${m.e}</text><text x="36" y="${m.y+4}" font-size="8.5" fill="${p>=m.pc?'rgba(255,255,255,.75)':'rgba(255,255,255,.25)'}" font-weight="${p>=m.pc?700:400}" font-family="Inter,sans-serif">${m.l}</text></g>`});
  if(theme!==THEMES.ocean)svg+=`<rect x="0" y="350" width="250" height="50" fill="#2a1a0a"/><rect x="0" y="350" width="250" height="4" fill="#4a3020"/>`;
  else svg+=`<rect x="0" y="0" width="250" height="30" fill="#87CEEB"/><rect x="0" y="26" width="250" height="4" fill="#5ab0d8"/>`;
  svg+=`<text x="235" y="388" text-anchor="end" font-size="28" font-weight="700" fill="white" opacity=".9" font-family="Inter,sans-serif">${Math.round(p)}%</text><text x="235" y="398" text-anchor="end" font-size="7" fill="rgba(255,255,255,.4)" font-family="Inter,sans-serif" font-weight="600">${theme.weekLabel.toUpperCase()}</text>`;
  return<div style={{width:"100%",maxWidth:250,margin:"0 auto"}} dangerouslySetInnerHTML={{__html:`<svg viewBox="0 0 250 400" xmlns="http://www.w3.org/2000/svg">${svg}</svg>`}}/>;
}

        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>{[{v:g.cum.tp,l:"lessons planned (all year)"},{v:tPct+"%",l:"this term coverage",c:tPct>=75?"var(--success)":null},{v:g.sk,l:`streak${g.sk>0?" \u{1F525}":""}`,c:g.sk>=3?"var(--success)":null,sub:g.ls>g.sk?`best: ${g.ls}`:null},{v:g.term.pw,l:"perfect weeks (this term)",c:g.term.pw>0?"var(--success)":null}].map((s,i)=><div key={i} className="card" style={{padding:10,textAlign:"center"}}><div className="hd" style={{fontSize:"1.4rem",fontWeight:700,color:s.c||"var(--text)"}}>{s.v}</div><div style={{fontSize:".6rem",color:"var(--text-muted)"}}>{s.l}</div>{s.sub&&<div style={{fontSize:".55rem",color:"var(--text-muted)",marginTop:1}}>{s.sub}</div>}</div>)}</div>

    <div style={{marginBottom:10}}><div className="sl">Achievements {"\u00B7"} <span className="mn">{uCnt}/{g.achs.length}</span> unlocked</div></div>

}

/* ═══ SETTINGS VIEW ══════════════════════════════════════════════════════ */
function SettingsView({onSave,displayMode,setDisplayMode}){
  const[cfg,setCfg]=useState(()=>migrateConfig(sGet("planner-config")||{}));
  const up=f=>{setCfg(c=>{const next={...c,...f};if(f.holidays)next.dayZeros=syncHolsToDZ(next.holidays,next.dayZeros);return next})};
  const[saved,setSaved]=useState(false);const termHint=(cfg.terms&&cfg.terms[0]&&cfg.terms[0].start)?cfg.terms[0].start:fmtISO(new Date());
  const classes=cfg.classes||[];const usedColours=new Set(classes.map(c=>c.colour));
  const addClass=()=>{up({classes:[...classes,{code:"",description:"",colour:DEFAULT_PALETTE.find(c=>!usedColours.has(c))||DEFAULT_PALETTE[0]}]})};
  const updateClass=(i,field,val)=>{const cls=[...classes];cls[i]={...cls[i],[field]:val};up({classes:cls})};
  const doSave=()=>{sSet("planner-config",cfg);onSave(cfg);setSaved(true);setTimeout(()=>setSaved(false),2000);if(window._plannerSync)window._plannerSync()};

  return<div><div className="hd" style={{fontSize:"1.15rem",fontWeight:600,color:"var(--accent)",marginBottom:14}}>{"\u2699\uFE0F"} School Setup</div>

      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{[["light","\u2600\uFE0F Light"],["dark","\u{1F319} Dark"],["light-hc","\u2600\uFE0F Bold"],["dark-hc","\u{1F319} Bold"]].map(([k,lbl])=><button key={k} onClick={()=>setDisplayMode(k)} style={{padding:"7px 14px",borderRadius:"var(--radius-sm)",border:displayMode===k?"2px solid var(--accent)":"1px solid var(--border)",background:displayMode===k?"var(--accent-light)":"var(--surface)",cursor:"pointer",fontSize:".78rem",color:displayMode===k?"var(--accent)":"var(--text-secondary)",fontWeight:displayMode===k?600:400,transition:"all .15s"}}>{lbl}</button>)}</div>
      <div style={{fontSize:".66rem",color:"var(--text-muted)",marginTop:8}}>Bold modes use higher contrast colours for improved readability.</div></div>

    <div className="card" style={{padding:18,marginBottom:14}}><div className="sl" style={{marginBottom:8}}>School & Cycle</div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:10}}><div style={{flex:1,minWidth:180}}><label className="fl">Your Name (optional)</label><input className="inp" value={cfg.userName||""} onChange={e=>up({userName:e.target.value})} placeholder="e.g. Ms Smith"/></div></div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}><div style={{flex:1,minWidth:180}}><label className="fl">School Name</label><input className="inp" value={cfg.school||""} onChange={e=>up({school:e.target.value})}/></div><div style={{minWidth:120}}><label className="fl">Cycle Length</label><select className="inp" value={cfg.cycleDays||7} onChange={e=>up({cycleDays:Number(e.target.value)})}>{[5,6,7,8,9,10].map(n=><option key={n} value={n}>{n}-day</option>)}</select></div></div>
      <div style={{fontSize:".68rem",color:"var(--text-muted)",marginTop:10,lineHeight:1.5}}>Your school uses a rotating timetable where the cycle advances one day for each teaching day. Weekends, public holidays, and Day 0 events pause the cycle \u2014 it picks up where it left off on the next teaching day.</div></div>

    <div className="card" style={{padding:18,marginBottom:14}}><div className="sl" style={{marginBottom:8}}>Export Format</div>
      <div style={{fontSize:".7rem",color:"var(--text-secondary)",marginBottom:10}}>Format used when downloading or copying the week plan.</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{[["org","Formatted"],["plain","Plain text"]].map(([k,lbl])=><button key={k} onClick={()=>up({exportStyle:k})} style={{padding:"7px 14px",borderRadius:"var(--radius-sm)",border:(cfg.exportStyle||"org")===k?"2px solid var(--accent)":"1px solid var(--border)",background:(cfg.exportStyle||"org")===k?"var(--accent-light)":"var(--surface)",cursor:"pointer",fontSize:".78rem",color:(cfg.exportStyle||"org")===k?"var(--accent)":"var(--text-secondary)",fontWeight:(cfg.exportStyle||"org")===k?600:400,transition:"all .15s"}}>{lbl}</button>)}</div></div>

    <div className="card" style={{padding:18,marginBottom:14}}><div className="sl" style={{marginBottom:8}}>Theme</div>
      <div style={{fontSize:".7rem",color:"var(--text-secondary)",marginBottom:10}}>Choose the style for your achievements and planning lab.</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{THEME_KEYS.map(k=>{const t=THEMES[k],on=cfg.theme===k;return<button key={k} onClick={()=>up({theme:k})} style={{padding:"8px 14px",borderRadius:"var(--radius-md)",border:on?"2px solid var(--accent)":"1px solid var(--border)",background:on?"var(--accent-light)":"var(--surface)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:".78rem",color:on?"var(--accent)":"var(--text-secondary)",fontWeight:on?600:400,transition:"all .15s"}}><span style={{fontSize:"1.1rem"}}>{t.icon}</span>{t.name}</button>})}</div></div>

    <div className="card" style={{padding:18,marginBottom:14}}><div className="sl" style={{marginBottom:8}}>Terms</div>
      {(cfg.terms||[]).map((t,i)=><div key={i} style={{marginBottom:12,padding:10,background:"var(--surface)",borderRadius:"var(--radius-md)",border:"1px solid var(--border)"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}><span className="hd" style={{fontSize:".8rem",fontWeight:600}}>Term {t.n}</span>{(cfg.terms||[]).length>1&&<button className="btn" onClick={()=>up({terms:(cfg.terms||[]).filter((_,j)=>j!==i).map((t,j)=>({...t,n:j+1}))})} style={{padding:"2px 8px",color:"var(--error)",fontSize:".68rem"}}>{"\u2715"}</button>}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><label className="fl">Start</label><SingleDatePicker value={t.start||""} onChange={v=>{const terms=[...(cfg.terms||[])];terms[i]={...terms[i],start:v};up({terms})}} startHint={t.start||termHint}/></div><div><label className="fl">End</label><SingleDatePicker value={t.end||""} onChange={v=>{const terms=[...(cfg.terms||[])];terms[i]={...terms[i],end:v};up({terms})}} startHint={t.end||t.start||termHint}/></div></div></div>)}
      <button className="btn" onClick={()=>up({terms:[...(cfg.terms||[]),{n:(cfg.terms||[]).length+1,start:"",end:""}]})}>+ Add Term</button></div>

    <div className="card" style={{padding:18,marginBottom:14}}><div className="sl" style={{marginBottom:8}}>Anchor</div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"end"}}><div><label className="fl">Anchor Date</label><SingleDatePicker value={(cfg.anchor||{}).date||""} onChange={v=>up({anchor:{...(cfg.anchor||{}),date:v}})} startHint={termHint}/></div><div><label className="fl">Cycle Day</label><select className="inp" value={(cfg.anchor||{}).day||1} onChange={e=>up({anchor:{...(cfg.anchor||{}),day:Number(e.target.value)}})} style={{maxWidth:100}}>{Array.from({length:cfg.cycleDays||7},(_,i)=><option key={i+1} value={i+1}>Day {i+1}</option>)}</select></div></div></div>

    <div className="card" style={{padding:18,marginBottom:14}}><div className="sl" style={{marginBottom:8}}>Statutory Holidays</div><div style={{fontSize:".68rem",color:"var(--text-secondary)",marginBottom:8}}>Click dates to toggle. These auto-add as Day 0s.</div><HolidayPicker holidays={cfg.holidays||[]} onChange={hols=>up({holidays:hols})} startHint={termHint}/></div>

    <div className="card" style={{padding:18,marginBottom:14}}><div className="sl" style={{marginBottom:8}}>Day 0 Dates</div><div style={{fontSize:".68rem",color:"var(--text-secondary)",marginBottom:8}}>Statutory holidays appear locked {"\u{1F512}"}. Add manual Day 0s by clicking dates.</div><DayZeroPicker dayZeros={cfg.dayZeros||[]} onChange={dz=>setCfg(c=>({...c,dayZeros:dz}))} holidays={cfg.holidays||[]} startHint={termHint}/></div>

    <div className="card" style={{padding:18,marginBottom:14}}><div className="sl" style={{marginBottom:8}}>Classes</div><div style={{fontSize:".68rem",color:"var(--text-secondary)",marginBottom:10}}>Define your classes with codes, descriptions, and colours.</div>
      {classes.map((c,i)=><div key={i} style={{marginBottom:10,padding:10,background:"var(--surface)",borderRadius:"var(--radius-md)",border:"1px solid var(--border)"}}><div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6,flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:4}}><button className="btn" onClick={()=>{const cls=[...classes];const ni=i-1;if(ni<0)return;[cls[i],cls[ni]]=[cls[ni],cls[i]];up({classes:cls})}} disabled={i===0} style={{padding:"2px 6px",fontSize:".65rem"}}>{"\u25B2"}</button><button className="btn" onClick={()=>{const cls=[...classes];const ni=i+1;if(ni>=cls.length)return;[cls[i],cls[ni]]=[cls[ni],cls[i]];up({classes:cls})}} disabled={i===classes.length-1} style={{padding:"2px 6px",fontSize:".65rem"}}>{"\u25BC"}</button></div>
        <div style={{flex:"0 0 100px"}}><input className="inp mn" value={c.code} onChange={e=>updateClass(i,"code",e.target.value.trim())} placeholder="e.g. 9SCI3" style={{fontSize:".78rem",fontWeight:700,textAlign:"center",background:c.colour,color:TEXT_FOR_BG[c.colour]||"#000"}}/></div>
        <div style={{flex:1,minWidth:140}}><input className="inp" value={c.description} onChange={e=>updateClass(i,"description",e.target.value)} placeholder="Description" style={{fontSize:".72rem"}}/></div>
        <button className="btn" onClick={()=>up({classes:classes.filter((_,j)=>j!==i)})} style={{padding:"2px 8px",color:"var(--error)",fontSize:".7rem"}}>{"\u2715"}</button></div>
        <ColourPicker value={c.colour} onChange={col=>updateClass(i,"colour",col)} usedColours={usedColours}/></div>)}
      <button className="btn" onClick={addClass}>+ Add Class</button>{classes.length===0&&<div style={{fontSize:".7rem",color:"var(--text-muted)",marginTop:8,fontStyle:"italic"}}>No classes defined yet.</div>}</div>

    <div className="card" style={{padding:18,marginBottom:14}}><div className="sl" style={{marginBottom:8}}>Timetable</div><div style={{fontSize:".68rem",color:"var(--text-secondary)",marginBottom:10}}>Select from your class list or type custom entries. Type "nc" for non-contact.</div>
      <div className="tt-grid" style={{gridTemplateColumns:`60px repeat(${cfg.cycleDays||7},1fr)`,overflowX:"auto"}}>
        <div/>
        {Array.from({length:cfg.cycleDays||7},(_,i)=><div key={i+1} className="hd" style={{textAlign:"center",fontSize:".7rem",fontWeight:600,color:"var(--text-muted)"}}>Day {i+1}</div>)}
        {["p1","p2","p3","p4","p5","p6"].map((pid,pi)=><React.Fragment key={pid}>
          <div className="hd" style={{fontSize:".72rem",fontWeight:600,color:"var(--accent)",display:"flex",alignItems:"center"}}>P{pi+1}</div>
          {Array.from({length:cfg.cycleDays||7},(_,di)=>{const day=di+1;const val=((cfg.timetable||{})[day]||{})[pid]||"";return <TTCombo key={`${day}-${pid}`} value={val} classes={classes} onChange={v=>{const tt={...(cfg.timetable||{})};if(!tt[day])tt[day]={};tt[day][pid]=v;up({timetable:tt})}}/> })}
        </React.Fragment>)}
      </div></div>

    <div style={{display:"flex",gap:8,alignItems:"center"}}><button className="btn-a" onClick={doSave}>Save Configuration</button>{saved&&<span style={{fontSize:".75rem",color:"var(--success)",fontWeight:600}}>{"\u2713"} Saved</span>}</div></div>;
}

/* ═══ DATA PANEL ═════════════════════════════════════════════════════════ */
function DataPanel({onClose,onImported,onSyncConn,onSyncDisc,lastSync,token,gistId,setToken,setGistId}){
  const[iSt,setISt]=useState(null);const[iData,setIData]=useState(null);const[iStats,setIStats]=useState(null);const fRef=useRef(null);
  const[showTok,setShowTok]=useState(false);const[syncMsg,setSyncMsg]=useState(null);const[parseErr,setParseErr]=useState("");const connected=token&&gistId;
  const doExport=()=>{const data=getAllData();const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`planner-backup-${new Date().toISOString().slice(0,10)}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)};
  const handleFile=e=>{const file=e.target.files&&e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const parsed=JSON.parse(ev.target.result);if(!parsed||typeof parsed!=="object"||Array.isArray(parsed))throw new Error("Not a valid backup object");const allKeys=Object.keys(parsed);const dataKeys=allKeys.filter(k=>k!=="_meta"&&k!=="_config");setIData(parsed);setIStats({hasCfg:!!parsed._config,n:dataKeys.filter(k=>k.startsWith("note:")).length,m:dataKeys.filter(k=>k.startsWith("daymeta:")).length});setISt("confirm");setParseErr("")}catch(err){setISt("error");setIData(null);setIStats(null);setParseErr(err.message||"Invalid file")}};reader.readAsText(file);e.target.value=""};
  const doImport=()=>{if(!iData)return;importAllData(iData);const keys=Object.keys(iData).filter(k=>k!=="_meta");setISt("done");setIStats(s=>({...s,imported:keys.length}));onImported()};
  const doConn=()=>{if(!token){setSyncMsg({type:"error",text:"Enter a token first"});return}setSyncMsg({type:"info",text:"Connecting..."});if(gistId){gistPull(token,gistId).then(()=>{setSyncMsg({type:"ok",text:"Connected"});if(onSyncConn)onSyncConn(token,gistId)}).catch(()=>setSyncMsg({type:"error",text:"Could not access Gist"}))}else{gistCreate(token,getAllData()).then(nid=>{setGistId(nid);setSyncMsg({type:"ok",text:"Created Gist: "+nid.slice(0,8)+"..."});if(onSyncConn)onSyncConn(token,nid)}).catch(()=>setSyncMsg({type:"error",text:"Failed. Check token has gist scope."}))}};
  const doDisc=()=>{setToken("");setGistId("");setSyncMsg({type:"info",text:"Disconnected"});if(onSyncDisc)onSyncDisc()};
  const doPull=()=>{if(!token||!gistId)return;setSyncMsg({type:"info",text:"Pulling..."});gistPull(token,gistId).then(data=>{importAllData(data);onImported();setSyncMsg({type:"ok",text:"Pulled \u2713"})}).catch(()=>setSyncMsg({type:"error",text:"Pull failed"}))};
  const doPush=()=>{if(!token||!gistId)return;setSyncMsg({type:"info",text:"Pushing..."});gistPush(token,gistId,getAllData()).then(()=>setSyncMsg({type:"ok",text:"Pushed \u2713"})).catch(()=>setSyncMsg({type:"error",text:"Push failed"}))};
  const cn=Object.keys(localStorage).filter(k=>k.startsWith("note:")).length;const cm=Object.keys(localStorage).filter(k=>k.startsWith("daymeta:")).length;
  const smc=syncMsg?(syncMsg.type==="ok"?"var(--success)":syncMsg.type==="error"?"var(--error)":"var(--text-muted)"):"";
  return<div className="overlay" onClick={onClose}><div onClick={e=>e.stopPropagation()} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:20,minWidth:300,maxWidth:460,maxHeight:"90vh",overflowY:"auto"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><span className="hd" style={{fontWeight:600,color:"var(--text)",fontSize:".95rem"}}>{"\u2699\uFE0F"} Data & Sync</span><button onClick={onClose} style={{background:"none",border:"none",color:"var(--text-secondary)",fontSize:"1.2rem",cursor:"pointer"}}>{"\u2715"}</button></div>
    <div style={{fontSize:".72rem",color:"var(--text-secondary)",marginBottom:14,padding:"8px 10px",background:"var(--surface)",borderRadius:"var(--radius-md)"}}><div style={{marginBottom:4,fontWeight:600,color:"var(--text)"}}>Current data</div><span className="mn">{cn}</span> notes {"\u00B7"} <span className="mn">{cm}</span> day settings</div>
    <div style={{marginBottom:16}}><div className="sl" style={{marginBottom:8}}>{"\u2601\uFE0F"} Cloud Sync</div>
      {connected?<div><div style={{fontSize:".72rem",color:"var(--success)",marginBottom:8,display:"flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:"50%",background:"var(--success)"}}/>Connected: <span className="mn" onClick={()=>navigator.clipboard&&navigator.clipboard.writeText(gistId)} style={{fontSize:".6rem",color:"var(--accent)",cursor:"pointer",textDecoration:"underline",wordBreak:"break-all"}}>{gistId}</span></div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}><Btn onClick={doPush}>{"\u2B06"} Push</Btn><Btn onClick={doPull}>{"\u2B07"} Pull</Btn><Btn onClick={doDisc} style={{color:"var(--error)"}}>{"\u2715"} Disconnect</Btn></div>{lastSync&&<div style={{fontSize:".6rem",color:"var(--text-muted)",marginTop:6}}>Last sync: {lastSync}</div>}</div>
      :<div><div style={{fontSize:".72rem",color:"var(--text-secondary)",marginBottom:8,lineHeight:1.5}}>Connect to GitHub Gist for cross-device sync. <a href="https://github.com/settings/tokens/new?scopes=gist&description=Lesson+Planner" target="_blank" rel="noopener" style={{color:"var(--accent)"}}>Create token {"\u2197"}</a></div><div style={{marginBottom:6}}><label className="fl">Token</label><div style={{display:"flex",gap:4}}><input className="inp" type={showTok?"text":"password"} value={token} onChange={e=>setToken(e.target.value)} placeholder="ghp_xxxx..." style={{fontSize:".72rem",flex:1}}/><Btn onClick={()=>setShowTok(!showTok)} style={{padding:"4px 8px",fontSize:".65rem"}}>{showTok?"\u{1F441}":"\u2022\u2022\u2022"}</Btn></div></div><div style={{marginBottom:8}}><label className="fl">Gist ID <span style={{fontWeight:400,color:"var(--text-muted)"}}>(blank = create new)</span></label><input className="inp" value={gistId} onChange={e=>setGistId(e.target.value)} placeholder="Leave empty for new" style={{fontSize:".72rem"}}/></div><button className="btn-a" onClick={doConn}>{"\u{1F517}"} Connect</button></div>}
      {syncMsg&&<div style={{fontSize:".68rem",color:smc,marginTop:8,padding:"4px 8px",background:"var(--surface)",borderRadius:4}}>{syncMsg.text}</div>}</div>
    <div style={{marginBottom:16}}><div className="sl" style={{marginBottom:8}}>Export</div><Btn onClick={doExport}>{"\u{1F4E5}"} Download Backup</Btn></div>
    <div><div className="sl" style={{marginBottom:8}}>Import</div>      <input ref={fRef} type="file" accept=".json,application/json,text/plain,.txt" onChange={handleFile} style={{display:"none"}}/>
      {iSt===null&&<Btn onClick={()=>fRef.current&&fRef.current.click()}>{"\u{1F4E4}"} Choose File</Btn>}
      {iSt==="confirm"&&iStats&&<div style={{padding:10,background:"var(--surface)",borderRadius:6,border:"1px solid var(--accent)"}}><div style={{fontSize:".7rem",color:"var(--text-secondary)",marginBottom:8}}>{iStats.hasCfg&&<span style={{color:"var(--success)",fontWeight:600}}>Config found {"\u2713"} </span>}<span className="mn">{iStats.n}</span> notes {"\u00B7"} <span className="mn">{iStats.m}</span> day settings</div><div style={{display:"flex",gap:8}}><button className="btn-a" onClick={doImport} style={{padding:"6px 14px"}}>{"\u2713"} Confirm</button><Btn onClick={()=>{setISt(null);setIData(null);setIStats(null)}}>Cancel</Btn></div></div>}
      {iSt==="done"&&iStats&&<div style={{padding:10,background:"var(--surface)",borderRadius:6,border:"1px solid var(--success)"}}><div style={{fontSize:".78rem",color:"var(--success)",fontWeight:600}}>{"\u2713"} Imported <span className="mn">{iStats.imported}</span> entries</div><Btn onClick={onClose} style={{marginTop:8}}>Close</Btn></div>}
      {iSt==="error"&&<div style={{padding:10,background:"var(--surface)",borderRadius:6,border:"1px solid var(--error)"}}><div style={{fontSize:".78rem",color:"var(--error)",fontWeight:600}}>{"\u26A0"} Import failed</div>{parseErr&&<div style={{fontSize:".6rem",color:"var(--text-muted)",marginTop:6,wordBreak:"break-all",fontFamily:"'JetBrains Mono',monospace",lineHeight:1.4}}>{parseErr}</div>}<Btn onClick={()=>{setISt(null);setParseErr("");fRef.current&&fRef.current.click()}} style={{marginTop:8}}>Try another</Btn></div>}
    </div></div></div>;
}

/* ═══ APP ═════════════════════════════════════════════════════════════════ */
function App(){
  const[dispMode,setDispMode]=useState(()=>{const v=localStorage.getItem("planner-theme");if(["light","dark","light-hc","dark-hc"].includes(v))return v;return "light-hc"});
  const today=useToday();const[cfg,setCfg]=useState(()=>migrateConfig(sGet("planner-config")));
  const eng=useMemo(()=>makeDateEngine(cfg),[cfg]);const planMon=useMemo(()=>getPlanMon(today),[today]);const planWN=eng?eng.wkN(planMon):8;
  const[view,setView]=useState("week");const[base,setBase]=useState(planMon);const[detDate,setDetDate]=useState(null);
  const[prevV,setPrevV]=useState("week");const[fp,setFP]=useState(null);const[mmO,setMmO]=useState(false);
  const[mc,setMC]=useState({});const mcR=useRef({});const[showDP,setShowDP]=useState(false);const[gr,setGR]=useState(0);
  const[syncSt,setSyncSt]=useState("idle");const[lastSync,setLastSync]=useState(null);const syncTimer=useRef(null);
  const[ghToken,setGhToken]=useState(()=>localStorage.getItem("planner-gh-token")||"");
  const[ghGistId,setGhGistId]=useState(()=>localStorage.getItem("planner-gist-id")||"");
  const syncConnected=()=>ghToken&&ghGistId;
  useEffect(()=>{if(ghToken)localStorage.setItem("planner-gh-token",ghToken);else localStorage.removeItem("planner-gh-token")},[ghToken]);
  useEffect(()=>{if(ghGistId)localStorage.setItem("planner-gist-id",ghGistId);else localStorage.removeItem("planner-gist-id")},[ghGistId]);
  useEffect(()=>{mcR.current=mc},[mc]);

  // Display mode + theme accent
  useEffect(()=>{document.documentElement.setAttribute("data-theme",dispMode);localStorage.setItem("planner-theme",dispMode)},[dispMode]);
  useEffect(()=>{
    const themeKey=cfg&&cfg.theme||"physics";const th=getTheme(themeKey);if(!th.accent)return;
    const modeMap={light:"light",dark:"dark","light-hc":"lightHc","dark-hc":"darkHc"};
    const ac=th.accent[modeMap[dispMode]||"light"];const r=document.documentElement.style;
    const isDk=dispMode==="dark"||dispMode==="dark-hc";
    r.setProperty("--accent",ac);r.setProperty("--accent-light",ac+(isDk?"18":"1A"));
    r.setProperty("--today-border",ac);r.setProperty("--today-bg",ac+(isDk?"20":"18"));
    r.setProperty("--xp-bar",ac);r.setProperty("--xp-glow",ac+"30");
    r.setProperty("--cal-sel",ac);r.setProperty("--cal-sel-text",isDk?"#000000":"#FFFFFF");
    r.setProperty("--input-focus",ac);
  },[dispMode,cfg&&cfg.theme]);

  useEffect(()=>{if(!eng)return;const p={};eng.terms.forEach(term=>{eng.getTermWks(term).flat().filter(eng.isSD).forEach(d=>{const k=dk(d),v=sGet(`daymeta:${k}`);if(v)p[k]=nM(v)})});mcR.current={...mcR.current,...p};setMC(c=>({...c,...p}))},[eng]);
  const triggerSync=useCallback(()=>{const tok=localStorage.getItem("planner-gh-token"),gid=localStorage.getItem("planner-gist-id");if(!tok||!gid)return;clearTimeout(syncTimer.current);syncTimer.current=setTimeout(()=>{setSyncSt("syncing");gistPush(tok,gid,getAllData()).then(()=>{setLastSync(new Date().toLocaleTimeString("en-NZ",{hour:"2-digit",minute:"2-digit"}));setSyncSt("synced");setTimeout(()=>setSyncSt("idle"),3000)}).catch(()=>{setSyncSt("error");setTimeout(()=>setSyncSt("idle"),5000)})},4000)},[]);
  useEffect(()=>{const tok=localStorage.getItem("planner-gh-token"),gid=localStorage.getItem("planner-gist-id");if(!tok||!gid)return;setSyncSt("syncing");gistPull(tok,gid).then(data=>{importAllData(data);const nc=migrateConfig(sGet("planner-config"));if(nc)setCfg(nc);const p={};if(eng)eng.terms.forEach(term=>{eng.getTermWks(term).flat().filter(eng.isSD).forEach(d=>{const k=dk(d),v=sGet(`daymeta:${k}`);if(v)p[k]=nM(v)})});mcR.current=p;setMC(p);setGR(r=>r+1);setLastSync(new Date().toLocaleTimeString("en-NZ",{hour:"2-digit",minute:"2-digit"}));setSyncSt("synced");setTimeout(()=>setSyncSt("idle"),3000)}).catch(()=>{setSyncSt("error");setTimeout(()=>setSyncSt("idle"),5000)})},[]);
  useEffect(()=>{window._plannerSync=triggerSync;window._plannerGamRefresh=()=>setGR(r=>r+1);return()=>{window._plannerSync=null;window._plannerGamRefresh=null}},[triggerSync]);

  const themeKey=cfg&&cfg.theme||"physics";
  const gam=useMemo(()=>compGam(eng,planWN,themeKey),[gr,view,planWN,eng,themeKey]);
  const uM=useCallback((key,ch)=>{const cur=mcR.current[key]||eM(),u={...cur,...ch};mcR.current={...mcR.current,[key]:u};setMC(c=>({...c,[key]:u}));sSet(`daymeta:${key}`,u);triggerSync()},[triggerSync]);
  const onMS=useCallback((key,m)=>{mcR.current={...mcR.current,[key]:m};setMC(c=>({...c,[key]:m}));triggerSync()},[triggerSync]);
  const goDay=(d,pid)=>{setPrevV(view);setDetDate(d);setFP(pid||null);setView("day")};
  const goWk=d=>{setBase(d);setView("week")};
  const goDayTab=()=>{if(!detDate){let target=view==="week"?getMon(base):planMon;if(eng&&!eng.isSD(target))target=eng.nearSD(target,1)||target;setDetDate(target)}setFP(null);setPrevV(view);setView("day")};
  const handleImport=useCallback(()=>{const nc=migrateConfig(sGet("planner-config"));if(nc)setCfg(nc);const p={};if(eng)eng.terms.forEach(term=>{eng.getTermWks(term).flat().filter(eng.isSD).forEach(d=>{const k=dk(d),v=sGet(`daymeta:${k}`);if(v)p[k]=nM(v)})});mcR.current=p;setMC(p);setGR(r=>r+1);triggerSync()},[eng,triggerSync]);
  const onWE=isWE(today);

  useEffect(()=>{if(!cfg){    const blank={school:"Dio",cycleDays:7,terms:[
    {n:1,start:"2026-01-27",end:"2026-04-03"},{n:2,start:"2026-04-20",end:"2026-07-03"},
    {n:3,start:"2026-07-27",end:"2026-09-25"},{n:4,start:"2026-10-12",end:"2026-12-08"}],
    holidays:[
      {date:"2026-01-26",name:"Auckland Anniversary"},{date:"2026-02-06",name:"Waitangi Day"},
      {date:"2026-04-03",name:"Good Friday"},{date:"2026-04-06",name:"Easter Monday"},
      {date:"2026-04-27",name:"ANZAC Day"},{date:"2026-06-01",name:"King's Birthday"},
      {date:"2026-07-10",name:"Matariki"},{date:"2026-10-26",name:"Labour Day"}],
    dayZeros:[
      {date:"2026-01-26",label:"Auckland Anniversary",source:"statutory"},
      {date:"2026-01-27",label:"Orientation",source:"manual"},{date:"2026-01-28",label:"Orientation",source:"manual"},
      {date:"2026-02-06",label:"Waitangi Day",source:"statutory"},
      {date:"2026-02-17",label:"Athletics Day",source:"manual"},
      {date:"2026-02-23",label:"EOTC Week",source:"manual"},{date:"2026-02-24",label:"EOTC Week",source:"manual"},
      {date:"2026-02-25",label:"EOTC Week",source:"manual"},{date:"2026-02-26",label:"EOTC Week",source:"manual"},
      {date:"2026-02-27",label:"EOTC Week",source:"manual"},
      {date:"2026-04-03",label:"Good Friday",source:"statutory"},{date:"2026-04-06",label:"Easter Monday",source:"statutory"},
      {date:"2026-04-27",label:"ANZAC Day",source:"statutory"},
      {date:"2026-05-15",label:"Teacher Only Day 1",source:"manual"},
      {date:"2026-06-01",label:"King's Birthday",source:"statutory"},
      {date:"2026-07-01",label:"House Music",source:"manual"},
      {date:"2026-07-10",label:"Matariki",source:"statutory"},
      {date:"2026-08-31",label:"Teacher Only Day 2",source:"manual"},
      {date:"2026-10-26",label:"Labour Day",source:"statutory"},
      {date:"2026-12-07",label:"Final Days",source:"manual"},{date:"2026-12-08",label:"Final Days",source:"manual"}],
    anchor:{date:"2026-04-02",day:2},timetable:{},classes:[],theme:"",userName:""};sSet("planner-config",blank);setCfg(blank)}},[cfg]);
  if(!cfg||!eng)return<div style={{padding:30,textAlign:"center",color:"var(--text-muted)"}}>Loading...</div>;

  return<CfgCtx.Provider value={eng}><div style={{minHeight:"100vh",padding:16}}><div style={{maxWidth:720,margin:"0 auto"}}>
    <div className="np" style={{marginBottom:16,borderBottom:"1px solid var(--border)",paddingBottom:14}}>
      <div style={{marginBottom:10}}>
        <div className="hd" style={{fontSize:"1.35rem",fontWeight:400,color:"var(--accent)",letterSpacing:"-.3px"}}>{"\u{1F4C5}"} {eng.school} Planner</div>
        <div style={{fontSize:".7rem",color:"var(--text-muted)"}}>{cfg.userName&&<span style={{color:"var(--text-secondary)",fontWeight:500}}>{cfg.userName} {"\u00B7"} </span>}{gam.lev.icon} {gam.lev.title}{gam.sk>0&&<span style={{color:"var(--success)",marginLeft:8}}>{"\u{1F525}"} {gam.sk}wk streak</span>}{onWE&&<span style={{color:"var(--accent)",fontStyle:"italic",marginLeft:8}}>Weekend mode</span>}</div>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:3,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-md)",padding:3}}>
          {[["term","\u{1F4C5} Term"],["week","\u{1F5D3} Week"],["day","\u{1F4CB} Day"],["class","\u{1F4DA} Class"],["lab",`${gam.th.icon} Lab`],["setup","\u2699\uFE0F Setup"]].map(([v,lbl])=>{const a=view===v;return<button key={v} className={`vtab${a?" on":""}`} onClick={()=>{if(v==="day")goDayTab();else{setView(v);setGR(r=>r+1)}}}>{lbl}</button>})}
        </div>
        <button onClick={()=>setShowDP(true)} title="Data & Sync" style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text)",borderRadius:"var(--radius-sm)",padding:"5px 10px",cursor:"pointer",fontSize:"1rem",lineHeight:1,position:"relative"}}>{"\u{1F4BE}"}{syncConnected()&&<span style={{position:"absolute",top:2,right:2,width:7,height:7,borderRadius:"50%",background:syncSt==="syncing"?"var(--accent)":syncSt==="synced"?"var(--success)":syncSt==="error"?"var(--error)":"var(--success)",border:"1px solid var(--card)"}}/>}</button>
      </div>
    </div>
    {(cfg&&(!cfg.classes||cfg.classes.length===0||!cfg.timetable||Object.keys(cfg.timetable).length===0))&&<div className="card" style={{padding:"14px 18px",marginBottom:14,border:"1px solid var(--dz-border)",background:"var(--dz-bg)",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}><span style={{fontSize:"1.1rem"}}>{"\u{1F44B}"}</span><div style={{flex:1,minWidth:200}}><div className="hd" style={{fontSize:".85rem",fontWeight:600,color:"var(--dz-text)"}}>Welcome! Add your classes and timetable</div><div style={{fontSize:".7rem",color:"var(--dz-text)",opacity:.8}}>Term dates and holidays are already set up. Head to Setup to add your classes and timetable.</div></div><button className="btn-a" onClick={()=>{setView("setup");setGR(r=>r+1)}} style={{padding:"6px 14px",fontSize:".78rem"}}>Go to Setup {"\u2192"}</button></div>}
    {showDP&&<DataPanel onClose={()=>setShowDP(false)} onImported={handleImport} onSyncConn={(tok,gid)=>{setGhToken(tok);setGhGistId(gid);triggerSync()}} onSyncDisc={()=>{setGhToken("");setGhGistId("");clearTimeout(syncTimer.current);setSyncSt("idle");setLastSync(null)}} lastSync={lastSync} token={ghToken} gistId={ghGistId} setToken={setGhToken} setGistId={setGhGistId}/>}
    {view==="term"&&<TermView onDay={goDay} onWk={goWk} mc={mc} g={gam} cfg={cfg}/>}
    {view==="week"&&<WeekView base={base} setBase={setBase} onDet={(d,pid)=>goDay(d,pid)} mc={mc} uM={uM} mmO={mmO} setMmO={setMmO} g={gam}/>}
    {view==="day"&&detDate&&<DayView date={detDate} setDate={d=>{setDetDate(d);setFP(null);setView("day")}} onBack={()=>{setFP(null);setGR(r=>r+1);setView(prevV==="day"?"week":prevV)}} mc={mc} onMS={onMS} fp={fp} g={gam}/>}
    {view==="class"&&<ClassView onDet={(d,pid)=>goDay(d,pid)} g={gam}/>}
    {view==="lab"&&<LabView g={gam}/>}
    {view==="setup"&&<SettingsView onSave={newCfg=>{setCfg(newCfg);setGR(r=>r+1)}} displayMode={dispMode} setDisplayMode={setDispMode}/>}
  </div></div></CfgCtx.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
