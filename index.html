<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{
  --page:#f0f3fa;--card:#fff;--surface:#f4f7fc;--surface-open:#eaeffc;
  --border:#ccd0e6;--border-hover:#9aa0c4;
  --text:#1a1b3c;--text-secondary:#4c5076;--text-muted:#848aaa;
  --today-bg:#dce8fc;--today-border:#2e60b4;
  --dz-bg:#fef3cc;--dz-border:#b08a18;--dz-text:#7a5010;
  --accent:#344fa4;--success:#1a5e30;--error:#881e1e;
  --break-bg:#eaedf8;--break-text:#848aaa;
  --input-bg:#f6f8fe;--input-border:#9aa0c4;--input-focus:#3858b8;
  --row-open:#eaecfa;--sel-border:#8890cc;
  --nc-bg:#d8dae8;--nc-text:#585876;
  --mm-tutor-bg:#d0f0d0;--mm-tutor-text:#265226;
  --mm-deans-bg:#f0e8a4;--mm-deans-text:#524410;
  --mm-fullsch-bg:#e2d0f8;--mm-fullsch-text:#4c269e;
  --mm-chapel-bg:#bcdaf4;--mm-chapel-text:#183c6c;
  --flag:#c06020;--bar-empty:#b0b4cc;
  --xp-bar:#3858b8;--xp-bar-bg:#dde0ee;--xp-glow:rgba(56,88,184,.2);
}
[data-theme="dark"]{
  --page:#0d0d1c;--card:#161626;--surface:#0b0b18;--surface-open:#13132c;
  --border:#222240;--border-hover:#363664;
  --text:#d0d0ea;--text-secondary:#6e6e96;--text-muted:#3c3c5e;
  --today-bg:#112040;--today-border:#2c5eb0;
  --dz-bg:#1a1106;--dz-border:#40300c;--dz-text:#be7a24;
  --accent:#4a6ab4;--success:#1e5c38;--error:#581c1c;
  --break-bg:#0b0b18;--break-text:#3c3c5e;
  --input-bg:#0b0b18;--input-border:#363664;--input-focus:#5070cc;
  --row-open:#14142c;--sel-border:#363680;
  --nc-bg:#242442;--nc-text:#585880;
  --mm-tutor-bg:#182818;--mm-tutor-text:#5cba5c;
  --mm-deans-bg:#282610;--mm-deans-text:#b6b44a;
  --mm-fullsch-bg:#1c0e30;--mm-fullsch-text:#9a6ace;
  --mm-chapel-bg:#0c1a28;--mm-chapel-text:#5898c4;
  --flag:#e09040;--bar-empty:#333358;
  --xp-bar:#5070cc;--xp-bar-bg:#1a1a34;--xp-glow:rgba(80,112,204,.25);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--page);color:var(--text);transition:background .2s,color .2s;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
textarea,input,button{font-family:'Inter',system-ui,sans-serif}
.hd{font-family:'Space Grotesk',system-ui,sans-serif}
.mn{font-family:'JetBrains Mono',monospace}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 13px;border-radius:5px;cursor:pointer;font-size:.78rem;white-space:nowrap}
.btn:disabled{opacity:.4;color:var(--text-muted);cursor:default}
.inp{background:var(--input-bg);border:1px solid var(--input-border);border-radius:4px;color:var(--text);padding:6px 8px;font-size:.81rem;width:100%;outline:none}
.inp:focus{border-color:var(--input-focus)}
.ta{background:var(--input-bg);border:1px solid var(--input-border);border-radius:4px;color:var(--text);padding:6px 8px;font-size:.81rem;width:100%;max-width:100%;outline:none;resize:vertical;box-sizing:border-box}
.ta:focus{border-color:var(--input-focus)}
.fl{font-size:.68rem;color:var(--text-secondary);display:flex;align-items:center;margin-bottom:4px}
.flb{font-size:.68rem;color:var(--text-secondary);display:block;margin-bottom:4px}
.brk{padding:3px 12px;font-size:.67rem;color:var(--break-text);border-bottom:1px solid var(--border);background:var(--break-bg);display:flex;justify-content:space-between;font-style:italic}
.pr{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;transition:background .12s}
.pr.exp{background:var(--row-open)}
.prd{padding:11px 14px 14px;background:var(--surface-open);border-top:1px solid var(--border)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200}
.pill{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;cursor:pointer;font-size:.76rem;background:var(--surface);color:var(--text-secondary);border:1px solid var(--border);transition:all .15s}
.vtab{padding:4px 11px;border-radius:5px;border:none;cursor:pointer;font-size:.73rem;font-weight:600;background:transparent;color:var(--text-secondary);transition:all .15s;letter-spacing:-.01em;font-family:'Space Grotesk',system-ui,sans-serif}
.vtab.on{font-weight:700;background:#3848a8;color:#fff}
.sl{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;font-weight:600;font-family:'Space Grotesk',system-ui,sans-serif}
.pb{border-radius:4px;padding:3px 6px;margin-bottom:3px;cursor:pointer;display:flex;flex-direction:column;gap:1px;min-height:38px;font-size:.62rem;font-weight:600;overflow:hidden;transition:outline .1s;justify-content:center;min-width:0}
.pb:hover{outline:1px solid var(--accent)}
.pb-nc{background:var(--nc-bg);color:var(--nc-text);border:1px dashed var(--bar-empty)}
.pb-e{opacity:.55;border:1px dashed var(--bar-empty)}
.wk-grid{display:grid;gap:2px 5px;align-items:stretch}
.wk-grid>div{min-width:0;overflow:hidden}
.qe{background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:12px 14px;margin-top:10px;display:flex;flex-direction:column;gap:8px}
.cv{display:flex;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.cv:hover{background:var(--row-open)}
.cv.empty{opacity:.55}
.xps{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 10px;display:flex;align-items:center;gap:8px;font-size:.65rem;margin-bottom:6px}
.xpbo{flex:1;height:6px;background:var(--xp-bar-bg);border-radius:3px;overflow:hidden;min-width:50px}
.xpbf{height:100%;background:var(--xp-bar);border-radius:3px;transition:width .6s;box-shadow:0 0 6px var(--xp-glow)}
.bs{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.bm{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;font-size:.8rem;border:1px solid var(--border);cursor:default;position:relative}
.bm.lk{opacity:.2;filter:grayscale(1)}
.bm .bt{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:.6rem;white-space:nowrap;z-index:10;color:var(--text-secondary);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.bm:hover .bt{display:block}
.fwb{font-size:.62rem;color:var(--text-muted);display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.fw{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:.58rem}
@keyframes fl1{0%,100%{opacity:.9}50%{opacity:.45}}
@keyframes fl2{0%,100%{opacity:.85}50%{opacity:.35}}
@keyframes od{from{stroke-dashoffset:0}to{stroke-dashoffset:-12}}
@keyframes pg{0%,100%{filter:drop-shadow(0 0 3px rgba(100,180,255,.4))}50%{filter:drop-shadow(0 0 10px rgba(100,180,255,.7))}}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:.8}}
.ach{transition:transform .15s,box-shadow .15s}
.ach.un:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
@media print{
  .np{display:none!important}
  body{background:#fff!important;color:#000!important;font-size:11pt}
  .card{border:1px solid #ccc!important;background:#fff!important;break-inside:avoid}
  .brk{background:#f5f5f5!important;color:#666!important}
  [data-theme] *{color-adjust:exact;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback, useMemo} = React;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const ANCHOR = new Date(2026,2,16);
const ANCHOR_DAY = 3;
const ANCHOR_WK = 8;
const HOLIDAYS = new Set(["2026-1-1","2026-1-2","2026-1-27","2026-2-6","2026-4-3","2026-4-6","2026-4-27","2026-6-1","2026-10-26","2026-12-25","2026-12-28"]);
const DZ_DATES = new Set(["2026-1-26","2026-1-27","2026-1-28","2026-2-6","2026-2-17","2026-2-23","2026-2-24","2026-2-25","2026-2-26","2026-2-27"]);
const TERMS = [
  {n:1, start:new Date(2026,0,26), end:new Date(2026,3,2)},
  {n:2, start:new Date(2026,4,4),  end:new Date(2026,6,3)},
  {n:3, start:new Date(2026,7,20), end:new Date(2026,9,23)},
  {n:4, start:new Date(2026,10,9), end:new Date(2026,11,11)}
];

const MMT = {
  tutor:  {label:"Tutor",               short:"T",  icon:"\u{1F4CB}",slot1:"Tutor Time",         slot2:"Morning Tea",asm:false},
  deans:  {label:"Dean's Assembly",     short:"DA", icon:"\u{1F3EB}",slot1:"Dean's Assembly",    slot2:"Morning Tea",asm:false},
  fullsch:{label:"Full School Assembly",short:"FSA",icon:"\u{1F393}",slot1:"Full School Assembly",slot2:"Morning Tea",asm:true},
  chapel: {label:"Chapel",              short:"C",  icon:"\u26EA",   slot1:"Morning Tea",         slot2:"Chapel",     asm:false}
};

const STD = {p1:{s:"08:30",e:"09:25"},p2:{s:"09:25",e:"10:20"},mt1:{s:"10:20",e:"10:45"},mt2:{s:"10:45",e:"11:10"},p3:{s:"11:10",e:"12:05"},p4:{s:"12:05",e:"12:55"},l:{s:"12:55",e:"13:50"},p5:{s:"13:50",e:"14:40"},p6:{s:"14:40",e:"15:30"}};
const ASM = {p1:{s:"08:30",e:"09:20"},p2:{s:"09:20",e:"10:10"},mt1:{s:"10:10",e:"10:50"},mt2:{s:"10:50",e:"11:20"},p3:{s:"11:20",e:"12:10"},p4:{s:"12:10",e:"13:00"},l:{s:"13:00",e:"13:50"},p5:{s:"13:50",e:"14:40"},p6:{s:"14:40",e:"15:30"}};

function bldP(mm) {
  var m = MMT[mm] || MMT.tutor;
  var t = m.asm ? ASM : STD;
  return [
    {id:"p1",label:"P1",start:t.p1.s,end:t.p1.e,brk:false},
    {id:"p2",label:"P2",start:t.p2.s,end:t.p2.e,brk:false},
    {id:"mt1",label:m.slot1,start:t.mt1.s,end:t.mt1.e,brk:true},
    {id:"mt2",label:m.slot2,start:t.mt2.s,end:t.mt2.e,brk:true},
    {id:"p3",label:"P3",start:t.p3.s,end:t.p3.e,brk:false},
    {id:"p4",label:"P4",start:t.p4.s,end:t.p4.e,brk:false},
    {id:"l",label:"Lunch",start:t.l.s,end:t.l.e,brk:true},
    {id:"p5",label:"P5",start:t.p5.s,end:t.p5.e,brk:false},
    {id:"p6",label:"P6",start:t.p6.s,end:t.p6.e,brk:false}
  ];
}

const TT = {
  1:{p1:"nc",p2:"11PSC7",p3:"9SCI3",p4:"7SCI8",p5:"13DPHY3",p6:"7SCI2"},
  2:{p1:"9SCI8",p2:"7SCI8",p3:"nc",p4:"9SCI3",p5:"nc",p6:"13DPHY3"},
  3:{p1:"13DPHY3",p2:"7SCI2",p3:"11PSC7",p4:"11PSC7",p5:"9SCI8",p6:"nc"},
  4:{p1:"9SCI3",p2:"13DPHY3",p3:"nc",p4:"7SCI8",p5:"9SCI8",p6:"nc"},
  5:{p1:"7SCI2",p2:"9SCI3",p3:"9SCI8",p4:"nc",p5:"11PSC7",p6:"nc"},
  6:{p1:"7SCI2",p2:"9SCI8",p3:"13DPHY3",p4:"13DPHY3",p5:"7SCI8",p6:"11PSC7"},
  7:{p1:"11PSC7",p2:"nc",p3:"nc",p4:"7SCI2",p5:"9SCI3",p6:"7SCI8"}
};

const CC = {
  "7SCI2":{bg:"#f28b82",tx:"#5c1010"},
  "7SCI8":{bg:"#ffb347",tx:"#5c2e00"},
  "9SCI3":{bg:"#b5e853",tx:"#2a4000"},
  "9SCI8":{bg:"#57c7a0",tx:"#0d3326"},
  "11PSC7":{bg:"#6ab4f5",tx:"#0a2a50"},
  "13DPHY3":{bg:"#e07ad8",tx:"#3d0040"}
};
const CLS = Object.keys(CC);
const PIDS = ["p1","p2","p3","p4","p5","p6"];
const FWORDS = ["todo","prepare","tbc","tbd","check","remind","follow up","incomplete","print","photocopy"];
const FRE = /\b(todo|prepare|tbc|tbd|check|remind|follow.?up|incomplete|print|photocopy)\b/i;
function hasF(t) { return FRE.test(t || ""); }

// ─── STORAGE ─────────────────────────────────────────────────────────────────
function sGet(k) { try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e) { return null; } }
function sSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch(e) { return false; } }

// ─── GIST SYNC ───────────────────────────────────────────────────────────────
function getAllData() {
  var data = {};
  Object.keys(localStorage).forEach(function(k) {
    if (k.indexOf("note:") === 0 || k.indexOf("daymeta:") === 0) data[k] = sGet(k);
  });
  data["_meta"] = {synced: new Date().toISOString(), version: 1};
  return data;
}

function importAllData(data) {
  Object.keys(data).forEach(function(k) {
    if (k !== "_meta") sSet(k, data[k]);
  });
}

function gistCreate(token, data) {
  return fetch("https://api.github.com/gists", {
    method: "POST",
    headers: {"Authorization": "token " + token, "Content-Type": "application/json"},
    body: JSON.stringify({description: "Lesson Planner Data", "public": false, files: {"planner-data.json": {content: JSON.stringify(data, null, 2)}}})
  }).then(function(r) { if (!r.ok) throw new Error("Create failed"); return r.json(); })
    .then(function(j) { return j.id; });
}

function gistPush(token, gistId, data) {
  return fetch("https://api.github.com/gists/" + gistId, {
    method: "PATCH",
    headers: {"Authorization": "token " + token, "Content-Type": "application/json"},
    body: JSON.stringify({files: {"planner-data.json": {content: JSON.stringify(data, null, 2)}}})
  }).then(function(r) { if (!r.ok) throw new Error("Push failed"); return true; });
}

function gistPull(token, gistId) {
  return fetch("https://api.github.com/gists/" + gistId, {
    headers: {"Authorization": "token " + token}
  }).then(function(r) { if (!r.ok) throw new Error("Pull failed"); return r.json(); })
    .then(function(j) {
      var f = j.files && j.files["planner-data.json"];
      if (!f || !f.content) throw new Error("No data in gist");
      return JSON.parse(f.content);
    });
}

// ─── DATE HELPERS ────────────────────────────────────────────────────────────
function dk(d) { return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); }
function dck(d) { return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function fmtF(d) { return d.toLocaleDateString("en-NZ",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); }
function fmtS(d) { return d.toLocaleDateString("en-NZ",{weekday:"short",day:"numeric",month:"short"}); }
function isWE(d) { var w=d.getDay(); return w===0||w===6; }
function isPH(d) { return HOLIDAYS.has(dck(d)); }
function isDZ(d) { return DZ_DATES.has(dck(d)); }
function inT(d) { return TERMS.some(function(t){ return d>=t.start && d<=t.end; }); }
function isSD(d) { return !isWE(d) && !isPH(d) && inT(d); }
function isTD(d) { return isSD(d) && !isDZ(d); }
function addD(d,n) { var r=new Date(d); r.setDate(r.getDate()+n); return r; }

function getMon(d) {
  var r=new Date(d), w=r.getDay();
  r.setDate(r.getDate()-(w===0?6:w-1));
  r.setHours(0,0,0,0);
  return r;
}

function getPlanMon(d) {
  var w=d.getDay();
  if (w===0||w===6) {
    var r=new Date(d);
    r.setDate(r.getDate()+(w===0?1:2));
    r.setHours(0,0,0,0);
    return r;
  }
  return getMon(d);
}

function getWDs(b) { var m=getMon(b); return [0,1,2,3,4].map(function(i){ return addD(m,i); }); }
function wkN(b) { return ANCHOR_WK + Math.round((getMon(b)-getMon(ANCHOR))/(7*864e5)); }

function nearSD(d, dir) {
  var x=addD(d,dir);
  for (var i=0; i<30; i++) { if (isSD(x)) return x; x=addD(x,dir); }
  return null;
}

function cycD(date) {
  var t=new Date(date); t.setHours(0,0,0,0);
  if (!isSD(t)) return null;
  if (isDZ(t)) return 0;
  var a=new Date(ANCHOR); a.setHours(0,0,0,0);
  var n=0, d=new Date(a);
  if (t>=a) {
    while (d<t) { if (isTD(d)) n++; d.setDate(d.getDate()+1); }
    return ((ANCHOR_DAY-1+n)%7)+1;
  } else {
    while (d>t) { d.setDate(d.getDate()-1); if (isTD(d)) n++; }
    return (((ANCHOR_DAY-1-n)%7)+7)%7+1;
  }
}

function getTermWks(term) {
  var ts=new Date(term.start); ts.setHours(0,0,0,0);
  var te=new Date(term.end); te.setHours(23,59,59,999);
  var ws=[], d=getMon(ts);
  while (d<=te) {
    var days=[0,1,2,3,4].map(function(i){ return addD(d,i); });
    if (days.some(function(x){ var xn=new Date(x); xn.setHours(0,0,0,0); return xn>=ts && xn<=te; })) ws.push(days);
    d=addD(d,7);
  }
  return ws;

// ─── DATA PANEL ──────────────────────────────────────────────────────────────
function DataPanel(props) {
  var [iSt, setISt] = useState(null);
  var [iData, setIData] = useState(null);
  var [iStats, setIStats] = useState(null);
  var fRef = useRef(null);

  // Sync state
  var [token, setToken] = useState(function() { return localStorage.getItem("planner-gh-token") || ""; });
  var [gistId, setGistId] = useState(function() { return localStorage.getItem("planner-gist-id") || ""; });
  var [showToken, setShowToken] = useState(false);
  var [syncMsg, setSyncMsg] = useState(null);

  var connected = token && gistId;

  var doExport = function() {
    var data = getAllData();
    var blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "planner-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  var handleFile = function(e) {
    var file = e.target.files && e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var parsed = JSON.parse(ev.target.result);
        var keys = Object.keys(parsed).filter(function(k) { return k !== "_meta"; });
        if (keys.length === 0) throw new Error("empty");
        setIData(parsed);
        setIStats({n: keys.filter(function(k){return k.indexOf("note:")===0;}).length, m: keys.filter(function(k){return k.indexOf("daymeta:")===0;}).length, t: keys.length});
        setISt("confirm");
      } catch(err) { setISt("error"); setIData(null); setIStats(null); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  var doImport = function() {
    if (!iData) return;
    var count = 0;
    Object.keys(iData).forEach(function(k) { if (k !== "_meta") { sSet(k, iData[k]); count++; } });
    setISt("done");
    setIStats(function(s) { return Object.assign({}, s, {imported: count}); });
    props.onImported();
  };

  // Sync: connect
  var doConnect = function() {
    if (!token) { setSyncMsg({type:"error",text:"Enter a GitHub token first"}); return; }
    setSyncMsg({type:"info",text:"Connecting\u2026"});
    if (gistId) {
      // Verify existing gist
      gistPull(token, gistId)
        .then(function() {
          localStorage.setItem("planner-gh-token", token);
          localStorage.setItem("planner-gist-id", gistId);
          setSyncMsg({type:"ok",text:"Connected to existing Gist"});
          if (props.onSyncConnected) props.onSyncConnected(token, gistId);
        })
        .catch(function() { setSyncMsg({type:"error",text:"Could not access that Gist. Check token and ID."}); });
    } else {
      // Create new gist
      var data = getAllData();
      gistCreate(token, data)
        .then(function(newId) {
